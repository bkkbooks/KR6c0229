body:
  text: 大般𠰥波羅蜜多經卷苐一百三十六初分挍量功德品苐卅五之卅四爾時天帝釋白佛言世尊云何名説相似般𠰥靜慮精進安忍淨戒布施波羅蜜多佛言尸迦𠰥善男子善女人説有所得般𠰥靜慮精進安忍淨戒布施波羅蜜多如是名説相似般𠰥靜慮精進安忍淨戒布施波羅蜜多時天帝釋復白佛言世尊云何諸善男子善女人説有所得般𠰥波羅蜜多名説相似般𠰥波羅蜜多復次佛言尸迦𠰥善男子善女人為發無上菩提心者説色𠰥常𠰥無常𠰥樂𠰥苦𠰥我無我説受相行識𠰥常𠰥無常𠰥樂𠰥苦𠰥我無我𠰥淨𠰥不淨𠰥有能依如是𠰥淨𠰥不淨法修行般𠰥是行般𠰥波羅蜜多𣸪作是説行般𠰥者應求色𠰥常𠰥無常樂𠰥苦我𠰥無我淨𠰥不淨應求受相行識𠰥常𠰥無常樂𠰥苦我𠰥無我淨𠰥不淨𠰥有能求如是法修行般𠰥是行般𠰥波羅蜜多尸迦𠰥善男子善女人如是求色𠰥常𠰥無常樂𠰥苦我𠰥無我淨𠰥不淨求受相行識𠰥常𠰥無常𠰥樂𠰥苦𠰥我𠰥無我𠰥淨𠰥不淨依此法行般𠰥者我説名為行有所得相似般𠰥波羅蜜多尸迦如前所説當知皆是説有所得相似般𠰥波羅蜜多此是十卷解曰此中六波羅蜜為使從般𠰥為使頭從爾時天帝起後五波羅蜜作使從時天帝起般𠰥為頭十八界全廣餘下五使頭所有廣略並四廣八略無菩薩十地四果中加一向字亦有廣略大般𠰥波羅蜜多經卷苐一百四十六初分挍量功德品苐卅都翻八十卷前卌卷般𠰥為頭後卌卷一切智智為頭廣略爾時天帝釋白佛言世尊云何名為宣説真正般𠰥靜慮精進安忍淨戒布施波羅蜜多佛言尸迦𠰥善男子善女人説無所得般𠰥靜慮精進安忍淨戒布施波羅蜜多如是名為宣説真正般𠰥靜慮精進安忍淨戒布施波羅蜜多時天帝釋復白佛言世尊云何諸善男子善女人説無所得般𠰥波羅蜜多名為宣説真正般𠰥波羅蜜多佛言復次尸迦𠰥善男子善女人為發無上菩提心者宣説般𠰥波羅蜜多復作是言汝善男子應修般𠰥波羅蜜多不應觀色𠰥常𠰥無常樂𠰥苦我𠰥無我淨𠰥不淨不應觀受相行識𠰥常𠰥無常樂𠰥苦我𠰥無我淨𠰥不淨何以故色色自性空受相行識受相行識自性空是色自性即非自性是受相行識自性亦非自性𠰥非自性即是般𠰥波羅蜜多於此般𠰥波羅蜜多色不可得彼常無常樂與苦我無我淨不淨亦不可得受相行識皆不可得彼常無常樂與苦我無我淨不淨亦不可得所以者何此中尚無色可得何况彼常與無常樂之與苦我與無我淨與不淨汝𠰥能修如是般𠰥是修般𠰥波羅蜜多此下結説至苐四遍便要尸迦是善男子善女人作此説是為宣説真正般𠰥波羅蜜多解曰此中以六波羅蜜次苐為頭無中加一向字四果亦爾此上草卷經大般𠰥波羅蜜經苐二百五初分難信解品復次善現般𠰥波羅蜜多清淨故色清淨色清淨故一切智智清淨何以故𠰥般𠰥波羅蜜多清淨𠰥色清淨𠰥一切智智清淨無二無二分無別無斷故色受想行識眼處耳鼻舌身意處色處聲香味觸法處眼界色界乃眼識界及眼觸眼觸為緣所生諸受清淨耳界聲界乃耳識界及耳觸耳觸為緣所生諸受清淨鼻界香界乃鼻識界及鼻觸鼻觸為緣所生諸受清淨舌界味界乃舌識界及舌觸舌觸為緣所生諸受清淨身界觸界乃身識界及身觸身觸為緣所生諸受清淨意界法界乃意識界及意觸意觸為緣所生諸受清淨地界水火風空識界無明行乃識名色六處觸受愛取有生老死愁歎苦憂惱布施波羅蜜淨戒乃安忍精進靜慮般𠰥波羅蜜多內空外空乃內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共相空一切法空不可得空無性空自性空至無性自性空真如法界乃法性不虛妄性不變異性平性離生性法定法住實際虛空界至不思議界苦聖諦集滅道聖諦四靜慮四無量四無色定八解脫八勝處九次苐定十遍處四念住四正斷乃四神足五根五力七覺支八聖道支空解脫門無相無願解脫菩薩十地五眼六神通佛十力四無所畏乃四無得解大慈大悲大喜大捨至十八佛不共法無忘失法恆住捨性一切智道相智一切相智一切陀羅尼門一切三摩地門預流果一來不還阿羅漢果獨覺菩提一切菩薩摩訶行諸佛無上正菩提下册卷以一切智智為頭光祿大夫檢校太子客兼御史中丞張允阡大中十三年四月八日建
